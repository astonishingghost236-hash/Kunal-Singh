<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Calculator</title>\n    <link rel="stylesheet" href="style.css">\n</head>\n<body>\n    <div class="calculator">\n        <input type="text" class="display" disabled>\n        <div class="buttons">\n            <button>1</button>\n            <button>2</button>\n            <button>3</button>\n            <button>+</button>\n            <button>4</button>\n            <button>5</button>\n            <button>6</button>\n            <button>-</button>\n            <button>7</button>\n            <button>8</button>\n            <button>9</button>\n            <button>*</button>\n            <button>0</button>\n            <button>C</button>\n            <button>=</button>\n            <button>/</button>\n        </div>\n    </div>\n    <script src="script.js"></script>\n</body>\n</html>
